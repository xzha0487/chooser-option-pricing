name: Auto BSM Pricing

on:
  workflow_run:
    workflows: ["Auto Data Update"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bsm-pricing:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install pandas numpy scipy
      - name: Run BSM pricing
        run: python scripts/bsm_pricing.py
      - name: Commit results
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data/processed/bsm_results.csv
          git commit -m "Auto BSM pricing $(date)" || echo "No changes"
          git push
